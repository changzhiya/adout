<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adout UI Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            overflow: hidden;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: linear-gradient(180deg, #4A00E0, #8E2DE2, #DA22FF);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .phone-frame.active {
            background: linear-gradient(180deg, #00B4DB, #0083B0, #00F260);
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 32px 40px;
            position: relative;
            z-index: 5;
        }

        /* Top Section - Title */
        .top-section {
            text-align: center;
            padding-top: 20px;
        }

        .app-title {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .app-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        /* Center Section - Toggle Button */
        .center-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .glow-effect {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(142, 45, 226, 0.4) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            transition: all 0.8s ease;
        }

        .phone-frame.active .glow-effect {
            background: radial-gradient(circle, rgba(0, 242, 96, 0.4) 0%, transparent 70%);
            opacity: 0.6;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        .toggle-button {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 2;
        }

        .toggle-button:hover {
            transform: scale(1.05);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.4);
        }

        .toggle-button:active {
            transform: scale(0.95);
        }

        .toggle-inner {
            width: 108px;
            height: 108px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.2));
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .phone-frame.active .toggle-inner {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .power-icon {
            width: 56px;
            height: 56px;
            position: relative;
        }

        .power-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 28px;
            border: 3px solid #fff;
            border-radius: 50%;
            clip-path: polygon(0 30%, 100% 30%, 100% 100%, 0 100%);
        }

        .power-icon::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 20px;
            background: #fff;
            border-radius: 2px;
        }

        .status-text {
            margin-top: 24px;
            text-align: center;
        }

        .status-label {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .status-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Bottom Section - Stats Card */
        .bottom-section {
            padding-bottom: 20px;
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .stat-divider {
            width: 1px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
        }

        .version-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Background decoration */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: 1;
        }

        .bg-circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
        }

        .bg-circle-2 {
            width: 200px;
            height: 200px;
            bottom: 100px;
            left: -80px;
        }

        /* Control Panel */
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .control-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-toggle {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-add {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-add:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stats-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="phone-frame" id="phoneFrame">
        <div class="phone-notch"></div>

        <!-- Background decorations -->
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>

        <div class="content">
            <!-- Top Section -->
            <div class="top-section">
                <div class="app-title">Adout</div>
                <div class="app-subtitle">广告拦截 · 纯净浏览</div>
            </div>

            <!-- Center Section -->
            <div class="center-section">
                <div class="glow-effect"></div>
                <div class="toggle-button" id="toggleBtn" onclick="toggleVpn()">
                    <div class="toggle-inner">
                        <div class="power-icon"></div>
                    </div>
                </div>
                <div class="status-text">
                    <div class="status-label" id="statusLabel">保护已关闭</div>
                    <div class="status-desc" id="statusDesc">点击开启广告拦截</div>
                </div>
            </div>

            <!-- Bottom Section -->
            <div class="bottom-section">
                <div class="stats-card">
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value" id="blockedCount">0</div>
                            <div class="stat-label">今日拦截</div>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item">
                            <div class="stat-value" id="ruleCount">528</div>
                            <div class="stat-label">过滤规则</div>
                        </div>
                    </div>
                </div>
                <div class="version-text">v1.0.0</div>
            </div>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="control-panel">
        <span class="stats-info" id="simStatus">模拟状态：关闭</span>
        <button class="control-btn btn-toggle" onclick="toggleVpn()">切换状态</button>
        <button class="control-btn btn-add" onclick="addBlocked()">模拟拦截 +10</button>
    </div>

    <script>
        let isActive = false;
        let blockedCount = 0;

        function toggleVpn() {
            isActive = !isActive;
            const phoneFrame = document.getElementById('phoneFrame');
            const statusLabel = document.getElementById('statusLabel');
            const statusDesc = document.getElementById('statusDesc');
            const simStatus = document.getElementById('simStatus');

            if (isActive) {
                phoneFrame.classList.add('active');
                statusLabel.textContent = '保护已开启';
                statusDesc.textContent = '正在拦截广告请求';
                simStatus.textContent = '模拟状态：开启';
                startBlocking();
            } else {
                phoneFrame.classList.remove('active');
                statusLabel.textContent = '保护已关闭';
                statusDesc.textContent = '点击开启广告拦截';
                simStatus.textContent = '模拟状态：关闭';
                stopBlocking();
            }
        }

        let blockingInterval = null;

        function startBlocking() {
            // Simulate blocking ads
            blockingInterval = setInterval(() => {
                addBlocked();
            }, 2000);
        }

        function stopBlocking() {
            if (blockingInterval) {
                clearInterval(blockingInterval);
                blockingInterval = null;
            }
        }

        function addBlocked() {
            blockedCount += 10;
            updateDisplay();
        }

        function updateDisplay() {
            const blockedEl = document.getElementById('blockedCount');
            blockedEl.textContent = formatNumber(blockedCount);
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // Initial state
        updateDisplay();
    </script>
</body>
</html>
